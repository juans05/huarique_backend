version: '3.8'

services:
  # PostgreSQL + PostGIS for local development
  postgres:
    image: postgis/postgis:14-3.3
    container_name: wuarike_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: wuarike_db
      POSTGRES_USER: wuarike_user
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wuarike_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend for local development
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lima-food-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_dev_data:
